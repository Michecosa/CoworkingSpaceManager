spring:
  application:
    name: security

  # Configurazione Database
  datasource:
    url: jdbc:mysql://host.docker.internal:3306/coworking_manager?createDatabaseIfNotExist=true
    username: root
    password: 
    driver-class-name: com.mysql.cj.jdbc.Driver

  # Configurazione JPA / Hibernate
  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true